version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-inventory}
      - DB_USERNAME=${DB_USERNAME:-inventory_user}
      - DB_PASSWORD=${DB_PASSWORD:-inventory_pass}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - inventory_network

  frontend:
    image: node:20-alpine
    container_name: inventory_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ${FRONTEND_PATH:-../frontend-vue3}:/app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - inventory_network

  nginx:
    image: nginx:1.25-alpine
    container_name: inventory_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - inventory_network

  mysql:
    image: mysql:8.0
    container_name: inventory_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-inventory}
      MYSQL_USER: ${DB_USERNAME:-inventory_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-inventory_pass}
    volumes:
      - inventory_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - inventory_network

networks:
  inventory_network:
    driver: bridge

volumes:
  inventory_mysql_data:
